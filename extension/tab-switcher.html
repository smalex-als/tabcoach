<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabcoach</title>
    <link rel="stylesheet" href="tab-switcher.css">
  </head>
  <body>
    <main class="shell" aria-label="Tabcoach tabs">
      <header class="toolbar">
        <label class="search-wrap" aria-label="Search tabs">
          <input class="search-input" id="searchInput" type="search" placeholder="Search tabs" autocomplete="off" spellcheck="false">
        </label>
        <div class="sort-controls" role="group" aria-label="Sort tabs">
          <button class="sort-button" type="button" data-sort-mode="window" aria-label="Window order" title="Window order">↕</button>
          <button class="sort-button" type="button" data-sort-mode="recent" aria-label="Recently visited" title="Recently visited">◷</button>
        </div>
        <div class="selection-actions" role="group" aria-label="Selected tab actions">
          <button class="toolbar-action-button" type="button" id="groupSelectedButton" aria-label="Create group for selected tab" title="Create group for selected tab">▦</button>
          <button class="toolbar-action-button" type="button" id="duplicateSelectedButton" aria-label="Duplicate selected tab" title="Duplicate selected tab">⧆</button>
        </div>
        <button class="new-tab-button" type="button" id="newTabButton" title="Open a new tab">+</button>
        <button class="close-button" type="button" id="closeButton" aria-label="Close" title="Close">×</button>
      </header>
      <div class="list" id="list" role="listbox" aria-label="Tabs in this window"></div>
      <footer class="desktop-apps" id="desktopApps" aria-label="Desktop applications"></footer>
    </main>
    <script src="tab-switcher.js"></script>
  </body>
</html>
