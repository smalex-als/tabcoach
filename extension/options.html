<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tabcoach Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Tabcoach Settings</h1>
        <div class="status" id="status" role="status" aria-live="polite"></div>
      </header>

      <form class="settings" id="settingsForm">
        <section class="section">
          <h2>Server</h2>
          <label class="field">
            <span>Server URL</span>
            <input id="serverBaseUrl" name="serverBaseUrl" type="url" required>
          </label>
          <label class="field compact">
            <span>Sync interval (minutes)</span>
            <input id="syncIntervalMinutes" name="syncIntervalMinutes" type="number" min="1" step="1" required>
          </label>
        </section>

        <section class="section">
          <h2>Behavior</h2>
          <label class="toggle">
            <input id="autoCloseDuplicates" name="autoCloseDuplicates" type="checkbox">
            <span>Auto-close duplicate tabs</span>
          </label>
          <label class="toggle">
            <input id="docsGrouping" name="docsGrouping" type="checkbox">
            <span>Group Google Docs tabs</span>
          </label>
          <label class="toggle">
            <input id="fetchDiagnostics" name="fetchDiagnostics" type="checkbox">
            <span>Log local fetch diagnostics</span>
          </label>
          <label class="toggle">
            <input id="switcherOpenLeft" name="switcherOpenLeft" type="checkbox">
            <span>Open tab switcher to the left of the current window</span>
          </label>
        </section>

        <section class="section">
          <h2>Badge</h2>
          <label class="field compact">
            <span>Badge mode</span>
            <select id="badgeMode" name="badgeMode">
              <option value="both">Health and duplicates</option>
              <option value="health">Health only</option>
              <option value="duplicates">Duplicates only</option>
            </select>
          </label>
        </section>

        <footer class="actions">
          <button class="secondary" type="button" id="resetButton">Reset</button>
          <button class="primary" type="submit">Save</button>
        </footer>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
